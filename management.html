<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>FileLinkKekUpload Settings</title>
    <script defer src="management.js" type="module"></script>
    <style>
      :root {
        color-scheme: light dark;
        font: message-box;
        --page-bg: #f9f9fb;
        --card-bg: #ffffff;
        --border: #cfcfd8;
        --text: #15141a;
        --muted: #5b5b66;
        --field-bg: #ffffff;
        --focus: #0060df;
        --button-bg: #0060df;
        --button-hover: #0250bb;
        --error: #c50042;
      }

      @media (prefers-color-scheme: dark) {
        :root {
          --page-bg: #1c1b22;
          --card-bg: #2b2a33;
          --border: #52525e;
          --text: #fbfbfe;
          --muted: #cfcfd8;
          --field-bg: #23222b;
          --error: #ff9aa2;
        }
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        padding: 24px;
        background: var(--page-bg);
        color: var(--text);
      }

      main {
        max-width: 620px;
        margin: 0 auto;
      }

      h1 {
        margin: 0 0 8px;
        font-size: 1.35rem;
        font-weight: 600;
      }

      .intro {
        margin: 0 0 18px;
        color: var(--muted);
        line-height: 1.45;
      }

      form {
        padding: 18px;
        border: 1px solid var(--border);
        border-radius: 8px;
        background: var(--card-bg);
        box-shadow: 0 1px 2px rgb(0 0 0 / 8%);
      }

      .field {
        display: grid;
        grid-template-columns: minmax(150px, 190px) 1fr;
        gap: 8px 16px;
        align-items: center;
        padding: 12px 0;
        border-bottom: 1px solid var(--border);
      }

      .field:first-child {
        padding-top: 0;
      }

      .field:last-of-type {
        border-bottom: 0;
      }

      label {
        font-weight: 600;
      }

      .control {
        min-width: 0;
      }

      input[type="text"],
      input[type="number"] {
        width: 100%;
        min-height: 32px;
        padding: 5px 8px;
        border: 1px solid var(--border);
        border-radius: 4px;
        background: var(--field-bg);
        color: var(--text);
        font: inherit;
      }

      input[type="checkbox"] {
        width: 16px;
        height: 16px;
        margin: 0;
        accent-color: var(--focus);
      }

      input:focus-visible,
      button:focus-visible {
        outline: 2px solid var(--focus);
        outline-offset: 2px;
      }

      .hint {
        margin: 6px 0 0;
        color: var(--muted);
        font-size: 0.9rem;
        line-height: 1.35;
      }

      .checkbox-row {
        display: flex;
        gap: 10px;
        align-items: center;
      }

      .actions {
        display: flex;
        justify-content: flex-end;
        margin-top: 18px;
      }

      .status {
        margin: 14px 0 0;
        color: var(--muted);
        line-height: 1.35;
      }

      .status.error {
        color: var(--error);
      }

      button {
        min-height: 32px;
        padding: 5px 18px;
        border: 1px solid transparent;
        border-radius: 4px;
        background: var(--button-bg);
        color: #ffffff;
        font: inherit;
        font-weight: 600;
      }

      button:hover:not(:disabled) {
        background: var(--button-hover);
      }

      button:disabled,
      input:disabled {
        opacity: 0.6;
      }

      @media (max-width: 520px) {
        body {
          padding: 16px;
        }

        .field {
          grid-template-columns: 1fr;
          gap: 6px;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <h1>FileLinkKekUpload</h1>
      <p class="intro">
        Configure the KekUpload server Thunderbird should use for FileLink
        attachments.
      </p>

      <form>
        <div class="field">
          <label for="instanceUrl">Instance URL</label>
          <div class="control">
            <input
              type="text"
              name="instanceUrl"
              id="instanceUrl"
              value="https://yourinstance.com"
              placeholder="https://upload.example.com"
            />
            <p class="hint">
              The root URL of your KekUpload server. Do not add /api.
            </p>
          </div>
        </div>

        <div class="field">
          <label for="uploadWithFileName">File names</label>
          <div class="control">
            <div class="checkbox-row">
              <input
                type="checkbox"
                name="uploadWithFileName"
                id="uploadWithFileName"
                checked="true"
              />
              <span>Include the original attachment name in uploads</span>
            </div>
          </div>
        </div>

        <div class="field">
          <label for="chunkSize">Chunk size</label>
          <div class="control">
            <input
              type="number"
              name="chunkSize"
              id="chunkSize"
              value="2097152"
              min="1"
              max="33554432"
              step="1"
            />
            <p class="hint">
              Number of bytes sent per upload chunk, up to 33554432 bytes.
            </p>
          </div>
        </div>

        <div class="actions">
          <button type="button" name="save" id="save">Save</button>
        </div>
        <p
          class="status"
          id="status"
          role="status"
          aria-live="polite"
          hidden
        ></p>
      </form>
    </main>
  </body>
</html>
